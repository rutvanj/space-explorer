<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Explorer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars"></div>

<header>
<h1>🌌 Space Explorer</h1>
<p class="subtitle">Explore the wonders of our solar system</p>
</header>

<input type="text" id="search" placeholder="Search planet..." onkeyup="searchPlanet()">

<section class="planet-container" id="planetContainer">

<div class="planet-card" data-name="Mercury" onclick="showInfo('Mercury')">
<img src="https://solarsystem.nasa.gov/system/feature_items/images/18_mercury_new.png">
<h2>Mercury</h2>
</div>

<div class="planet-card" data-name="Venus" onclick="showInfo('Venus')">
<img src="https://solarsystem.nasa.gov/system/feature_items/images/27_venus_jg.png">
<h2>Venus</h2>
</div>

<div class="planet-card" data-name="Earth" onclick="showInfo('Earth')">
<img src="https://solarsystem.nasa.gov/system/feature_items/images/17_earth.png">
<h2>Earth</h2>
</div>

<div class="planet-card" data-name="Mars" onclick="showInfo('Mars')">
<img src="https://solarsystem.nasa.gov/system/feature_items/images/19_mars.png">
<h2>Mars</h2>
</div>

<div class="planet-card" data-name="Jupiter" onclick="showInfo('Jupiter')">
<img src="https://solarsystem.nasa.gov/system/feature_items/images/16_jupiter_new.png">
<h2>Jupiter</h2>
</div>

<div class="planet-card" data-name="Saturn" onclick="showInfo('Saturn')">
<img src="https://solarsystem.nasa.gov/system/feature_items/images/28_saturn.png">
<h2>Saturn</h2>
</div>

</section>

<div id="infoBox" class="info-box">
<span onclick="closeInfo()" class="close-btn">✖</span>
<p id="planetInfo"></p>
</div>

<script src="script.js"></script>

</body>
</html>
