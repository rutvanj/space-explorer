<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stars"></div>

    <header>
        <h1>🌌 Space Explorer</h1>
        <p>Explore the wonders of our universe</p>
    </header>

    <section class="planet-container">

        <div class="planet-card" onclick="showInfo('Mercury')">
            <img src="https://solarsystem.nasa.gov/system/feature_items/images/18_mercury_new.png" alt="Mercury">
            <h2>Mercury</h2>
        </div>

        <div class="planet-card" onclick="showInfo('Mars')">
            <img src="https://solarsystem.nasa.gov/system/feature_items/images/19_mars.png" alt="Mars">
            <h2>Mars</h2>
        </div>

        <div class="planet-card" onclick="showInfo('Jupiter')">
            <img src="https://solarsystem.nasa.gov/system/feature_items/images/16_jupiter_new.png" alt="Jupiter">
            <h2>Jupiter</h2>
        </div>

        <div class="planet-card" onclick="showInfo('Saturn')">
            <img src="https://solarsystem.nasa.gov/system/feature_items/images/28_saturn.png" alt="Saturn">
            <h2>Saturn</h2>
        </div>

    </section>

    <div id="infoBox" class="info-box">
        <span onclick="closeInfo()" class="close-btn">✖</span>
        <p id="planetInfo"></p>
    </div>

<script src="script.js"></script>
</body>
</html>
